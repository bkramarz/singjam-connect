[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=600, stale-while-revalidate=86400"
    Link = "<https://orwkaalmfxzwifnmzvts.supabase.co>; rel=preconnect"

[[headers]]
  for = "/repertoire/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/friends/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/jams/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "private, no-store"
